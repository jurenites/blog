<style>
  .font-family-grid {
    display: grid;
    gap: var(--space-scale-large-default);
  }

  .font-family-sample {
    display: grid;
    gap: var(--space-scale-small-default);
    padding: var(--space-scale-large-default);
    border: var(--shape-border-width-hairline-default) solid var(--color-border-subtle-default);
    border-radius: var(--shape-corner-radius-medium-default);
    background: var(--color-surface-panel-default);
  }

  .font-family-sample__label {
    color: var(--color-text-secondary-default);
    font-family: var(--typography-font-family-sans-default);
    font-size: var(--typography-caption-default-font-size);
  }

  .font-family-sample__text {
    margin: 0;
    color: var(--color-text-primary-default);
    line-height: 1.3;
  }
</style>
<main class="storybook-stack">
  <section class="font-family-grid">
    {{font_rows}}
  </section>
</main>
