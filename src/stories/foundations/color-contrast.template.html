<style>
  .contrast-table-wrap {
    overflow: auto;
    border: var(--shape-border-width-hairline-default) solid var(--color-border-subtle-default);
    border-radius: var(--shape-corner-radius-small-default);
    background: var(--color-surface-panel-default);
  }
  .contrast-table {
    width: max-content;
    min-width: 100%;
    border-collapse: collapse;
  }
  .contrast-table th,
  .contrast-table td {
    min-width: 104px;
    padding: var(--space-scale-small-size);
    border: var(--shape-border-width-hairline-default) solid var(--color-border-subtle-default);
    text-align: left;
    vertical-align: top;
  }
  .contrast-table th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--color-surface-panel-raised);
    color: var(--color-text-primary-default);
    font-size: 11px;
  }
  .contrast-table th:first-child {
    left: 0;
    z-index: 3;
  }
  .contrast-table__row-heading {
    position: sticky;
    left: 0;
    z-index: 1;
    background: var(--color-surface-panel-raised);
  }
  .contrast-token {
    display: block;
    color: var(--color-text-primary-default);
    font-size: 11px;
  }
  .contrast-value {
    display: block;
    color: var(--color-text-secondary-default);
    font-size: 10px;
  }
  .contrast-cell {
    height: 72px;
    font-size: 12px;
    line-height: 1.35;
  }
  .contrast-cell__grade,
  .contrast-cell__ratio {
    display: block;
    font-weight: 700;
  }
  .contrast-cell__grade--aaa {
    text-decoration: underline;
  }
  .contrast-cell__grade--aa {
    text-decoration: none;
  }
  .contrast-cell__grade--fail {
    text-decoration: line-through;
  }
</style>
<main class="contrast-table-wrap">
  <table class="contrast-table">
    <thead>
      <tr>
        <th scope="col">Background / Text</th>
        {{header_cells}}
      </tr>
    </thead>
    <tbody>
      {{body_rows}}
    </tbody>
  </table>
</main>
