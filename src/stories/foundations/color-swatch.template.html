<figure class="swatch">
  <div class="swatch__chip" style="background:{{value}}"></div>
  <figcaption class="swatch__caption">
    <span class="swatch__name">{{name}}</span>
    <code class="swatch__value">{{value}}</code>
    <code class="swatch__var">--{{variable}}</code>
  </figcaption>
</figure>
