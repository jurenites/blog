<div class="storybook-stack storybook-stack--wide">
  <article class="article-teaser">
    <p class="article-teaser__eyebrow">{{eyebrow_heading}}</p>
    <h2 class="article-teaser__title">
      <a class="article-teaser__title-link" href="{{article_url}}">{{teaser_title}}</a>
    </h2>
    <p class="article-teaser__excerpt">{{teaser_excerpt}}</p>
    <div class="article-teaser__meta">
      <div class="article-teaser__published-date">
        {{date_value}}
      </div>
      <div class="article-teaser__reading-time">
        {{reading_time}}
      </div>
    </div>
  </article>
</div>
