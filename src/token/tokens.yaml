# Editable source of truth for design tokens.
# Run npm run build:tokens after changes to regenerate the SCSS token output.
"$schema": https://design-tokens.github.io/community-group/format/
meta:
  project: blog-jurenites
  status: draft
  sourceWorkflow: idea-file -> tokens -> Storybook -> Figma -> Drupal
  figmaFile: https://www.figma.com/design/UMshUcV87SZqsg1aDaDpnZ/blog-jurenites
  sourceOfTruth: src/token/tokens.yaml is the editable single source of truth. Generated SCSS/CSS outputs and Figma variables are derived from it.
  typographyBasis: Type scale follows Google Material Design M2 roles (headline-1..6, subtitle, body, button, caption, overline).
  colorRule: Colors are HEX only. Never use the CSS opacity property; alpha is expressed as 8-digit HEX (for example shadow colors) so composited colors stay predictable.
  note: 'This file is large on purpose: it is a data contract, not a code module. Keep groups well namespaced so flattened names stay searchable.'
system:
  grid:
    base-unit:
      "$type": dimension
      "$value": 8px
      "$description": All spacing and layout measurements should be multiples of this value unless there is a documented exception.
    minimum-interactive-size:
      "$type": dimension
      "$value": 40px
      "$description": Minimum practical element size for controls and clickable UI.
  icon:
    default-svg-viewport:
      "$type": dimension
      "$value": 24px
      "$description": Small icons sit inside a 24 by 24 SVG viewport.
    minimum-container-size:
      "$type": dimension
      "$value": 40px
      "$description": Icons smaller than the interactive minimum should sit inside a 40 by 40 control/container.
  breakpoint:
    mobile-min:
      "$type": dimension
      "$value": 360px
      "$description": Smallest supported viewport. Do not design below this width.
    mobile-max:
      "$type": dimension
      "$value": 640px
      "$description": Upper bound of the mobile range.
    tablet-min:
      "$type": dimension
      "$value": 641px
      "$description": Lower bound of the tablet range.
    tablet-max:
      "$type": dimension
      "$value": 1279px
      "$description": Upper bound of the tablet range.
    desktop-min:
      "$type": dimension
      "$value": 1280px
      "$description": Lower bound of the desktop range and the primary design width.
    desktop-max:
      "$type": dimension
      "$value": 1919px
      "$description": Upper bound of the standard desktop range (up to just under full HD).
    wide-min:
      "$type": dimension
      "$value": 1920px
      "$description": Full HD and larger, including ultra-wide screens.
  naming:
    separator:
      "$type": string
      "$value": "-"
      "$description": Flattened token names use dash-separated namespaces.
    pattern:
      "$type": string
      "$value": "{layer}-{scope}-{part}-{property}-{state}"
      "$description": 'Use the shortest complete name. Each token must be descriptive and multi-part. Never use a lone generic word (invalid: orange, size, card).'
    examples:
      "$type": string
      "$value": component-timeline-marker-size-active, typography-headline-1-font-size, color-action-primary-default
