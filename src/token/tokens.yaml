        "$value": default
      raised:
        "$type": string
        "$value": raised
      flat:
        "$type": string
        "$value": flat
  date-value:
    default-mode:
      "$type": string
      "$value": date-value
    default-format:
      "$type": string
      "$value": month-day-year
    default-display:
      "$type": string
      "$value": muted
    mode:
      date-value:
        "$type": string
        "$value": date-value
      raw-text:
        "$type": string
        "$value": raw-text
    format:
      month-day-year:
        "$type": string
        "$value": month-day-year
      long-date:
        "$type": string
        "$value": long-date
      iso-date:
        "$type": string
        "$value": iso-date
    display:
      muted:
        "$type": string
        "$value": muted
      day:
        "$type": string
        "$value": day
      time:
        "$type": string
        "$value": time
