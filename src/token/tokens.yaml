      "$value": "#b6974b"
    error:
      "$type": color
      "$value": "#b85c5c"
    info:
      "$type": color
      "$value": "#7a8797"
  surface:
    page-default:
      "$type": color
      "$value": "{color.palette.black}"
      "$description": Base page background.
    panel-default:
      "$type": color
      "$value": "{color.palette.canvas}"
      "$description": Raised panel/card background.
    panel-raised:
      "$type": color
      "$value": "{color.palette.panel}"
      "$description": Higher elevation surface.
  text:
    primary-default:
      "$type": color
      "$value": "{color.palette.white}"
    secondary-default:
